<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/icon.ico" type="image/x-icon">
    <title>Análise Editorial - QualProcessador</title>
    
    <meta name="description" content="Leia análises detalhadas, guias de hardware e reviews de processadores na QualProcessador.">
    <meta name="robots" content="index, follow">
    
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="QualProcessador">
    
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            padding: 0; 
        }

        /* BARRA DE NAVEGAÇÃO SUPERIOR */
        .article-nav {
            background-color: #0f172a;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .article-nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.9rem; 
            transition: color 0.2s; 
        }
        .article-nav a:hover { color: #38bdf8; }

        /* CABEÇALHO DO ARTIGO (HERO) */
        .article-header {
            max-width: 850px;
            margin: 50px auto 30px auto;
            padding: 0 20px;
            text-align: left;
        }
        .meta-category { 
            color: #ef4444; 
            font-weight: 800; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            display: block;
            margin-bottom: 12px;
        }
        .article-title { 
            font-size: 2.6rem; 
            font-weight: 800; 
            line-height: 1.25; 
            color: #0f172a; 
            letter-spacing: -1.5px;
            margin: 0 0 20px 0;
        }
        .article-meta-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.88rem;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 25px;
            font-weight: 500;
        }
        .author-avatar {
            width: 35px;
            height: 35px;
            background-color: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            font-size: 0.8rem;
        }

        /* CORPO DO TEXTO */
        .article-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 20px 80px 20px;
        }
        
        .article-body {
            font-family: 'Lora', serif;
            font-size: 1.15rem;
            line-height: 1.85;
            color: #334155;
        }

        .article-body h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
            margin-top: 45px;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        .article-body p { margin-bottom: 25px; }
        .article-body ul, .article-body ol { margin-bottom: 25px; padding-left: 20px; }
        .article-body li { margin-bottom: 10px; }

        /* Caixa de Destaque / Alerta */
        .alert-box {
            font-family: 'Poppins', sans-serif;
            background-color: #f0fdf4;
            border-left: 4px solid #10b981;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1rem;
            color: #14532d;
            margin: 35px 0;
            line-height: 1.6;
        }
        .alert-box strong { color: #166534; }

        /* Tabelas de Benchmark */
        .article-table {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            border-collapse: collapse;
            margin: 35px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }
        .article-table th {
            background-color: #1e293b;
            color: white;
            text-align: left;
            padding: 14px 20px;
            font-weight: 600;
        }
        .article-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
            color: #475569;
        }
        .article-table tr:last-child td { border-bottom: none; }
        .article-table tr:nth-child(even) { background-color: #f8fafc; }

        footer { text-align: center; padding: 40px; color: #64748b; border-top: 1px solid #e2e8f0; font-size: 0.85rem; font-weight: 600; background: white; }

        /* --- BOTÃO E MODAL ADMIN --- */
        .btn-admin-floating {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.35);
            z-index: 999;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-admin-floating:hover {
            transform: scale(1.05);
            background: #dc2626;
        }

        .admin-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .admin-modal-box {
            background: white;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
        }
        #editor-container { height: 300px; margin-bottom: 20px; }
        .modal-actions { display: flex; justify-content: space-between; align-items: center; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 12px 24px; font-weight: 700; border-radius: 6px; cursor: pointer; }
        .btn-close { background: #64748b; color: white; border: none; padding: 12px 24px; font-weight: 600; border-radius: 6px; cursor: pointer; }

        @media (max-width: 768px) {
            .article-title { font-size: 2rem; }
            .article-body { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <nav class="article-nav">
        <a href="analises.html">← Voltar para Artigos</a>
        <a href="index.html">Página Inicial</a>
    </nav>

    <main id="conteudo-artigo-dinamico"></main>

    <button class="btn-admin-floating" id="btnAabrirAdmin" onclick="abrirPainelAdmin()">+ Novo Artigo (Admin)</button>

    <div class="admin-modal-overlay" id="modalAdmin">
        <div class="admin-modal-box">
            
            <div id="secaoLogin" style="display: none;">
                <h2>Login de Administrador</h2>
                <p>Apenas <strong>jpsoaresoficial@gmail.com</strong> tem autorização para publicar artigos.</p>
                <div class="form-group">
                    <label>E-mail:</label>
                    <input type="email" id="loginEmail" value="jpsoaresoficial@gmail.com">
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" id="loginSenha" placeholder="Sua senha do Supabase">
                </div>
                <button class="btn-submit" onclick="fazerLoginAdmin()">Entrar no Painel</button>
                <button class="btn-close" onclick="fecharPainelAdmin()">Cancelar</button>
            </div>

            <div id="secaoEditor" style="display: none;">
                <h2>Publicar Novo Artigo Editorial</h2>
                <div class="form-group">
                    <label>Título do Artigo (Focado em SEO):</label>
                    <input type="text" id="postTitulo" placeholder="Ex: Ryzen 5 5600GT vale a pena em 2026?">
                </div>
                <div class="form-group">
                    <label>Categoria:</label>
                    <input type="text" id="postCategoria" value="Guia de Hardware • Tecnologia">
                </div>
                <div class="form-group">
                    <label>Descrição Meta (SEO / Resumo no Google):</label>
                    <input type="text" id="postDescricao" placeholder="Breve descrição de até 160 caracteres para o Google">
                </div>
                <div class="form-group">
                    <label>Conteúdo do Artigo (Use o editor abaixo):</label>
                    <div id="editor-container"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn-submit" onclick="publicarArtigoSupabase()">🚀 Publicar Artigo</button>
                    <button class="btn-close" onclick="fecharPainelAdmin()">Fechar</button>
                </div>
            </div>

        </div>
    </div>

    <footer>&copy; 2026 QualProcessador - Editoriais de Alta Performance.</footer>

    <script src="dados.js"></script>
    <script>
        // --- 1. CONFIGURAÇÃO DO SUPABASE ---
        // Preencha com as suas credenciais do painel do Supabase (Project Settings > API)
        const SUPABASE_URL = "https://sterozqxsblanvjyzjmi.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0ZXJvenF4c2JsYW52anl6am1pIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mzc5Nzc5MCwiZXhwIjoyMDk5MzczNzkwfQ.LnU1u7jpLt69Ia8UEsrF5_RBlQbS2f5GL386OansCEs";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const ADMIN_EMAIL = "jpsoaresoficial@gmail.com";
        let quillEditor = null;

        // Inicialização do Editor Ricos Quill.js
        document.addEventListener('DOMContentLoaded', () => {
            quillEditor = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image', 'code-block'],
                        ['clean']
                    ]
                }
            });
            carregarArtigo();
        });

        // --- 2. SISTEMA DE LEITURA DE ARTIGOS ---
        const parametrosUrl = new URLSearchParams(window.location.search);
        const idArtigo = parseInt(parametrosUrl.get('id')) || 0;
        const slugParam = parametrosUrl.get('slug');
        const mainContainer = document.getElementById('conteudo-artigo-dinamico');

        async function carregarArtigo() {
            // Tenta buscar no Supabase primeiro (Banco Dinâmico)
            let query = supabase.from('artigos').select('*');
            if (slugParam) {
                query = query.eq('slug', slugParam);
            } else {
                query = query.eq('id', idArtigo);
            }

            const { data: artigosSupabase, error } = await query.single();

            if (artigosSupabase) {
                configurarSEO(artigosSupabase.titulo, artigosSupabase.descricao);
                renderizarHtml(artigosSupabase.titulo, artigosSupabase.categoria, artigosSupabase.conteudo);
                return;
            }

            // Fallback: Banco Local Estático (guiasGerais)
            if (typeof guiasGerais !== 'undefined' && guiasGerais[idArtigo]) {
                const artigo = guiasGerais[idArtigo];
                configurarSEO(artigo.titulo, artigo.descricao);
                renderizarHtml(artigo.titulo, artigo.categoria, artigo.texto);
            } else {
                configurarSEO("Artigo Não Encontrado - QualProcessador", "O artigo solicitado não foi localizado.");
                mainContainer.innerHTML = `
                    <div class="article-container" style="text-align: center; margin-top: 100px;">
                        <h2>Artigo Não Encontrado</h2>
                        <p>No momento, esta análise editorial não foi localizada em nosso banco de dados.</p>
                        <a href="analises.html" style="color: #38bdf8; font-weight: bold;">Voltar ao Hub de Análises</a>
                    </div>
                `;
            }
        }

        // --- 3. AUTENTICAÇÃO E ADMINISTRAÇÃO ---
        async function abrirPainelAdmin() {
            document.getElementById('modalAdmin').style.display = 'flex';
            
            // Checar se já existe sessão ativa
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user.email === ADMIN_EMAIL) {
                exibirEditor();
            } else {
                exibirLogin();
            }
        }

        function fecharPainelAdmin() {
            document.getElementById('modalAdmin').style.display = 'none';
        }

        function exibirLogin() {
            document.getElementById('secaoLogin').style.display = 'block';
            document.getElementById('secaoEditor').style.display = 'none';
        }

        function exibirEditor() {
            document.getElementById('secaoLogin').style.display = 'none';
            document.getElementById('secaoEditor').style.display = 'block';
        }

        async function fazerLoginAdmin() {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            if (email !== ADMIN_EMAIL) {
                alert('Acesso Negado: Este e-mail não é o administrador do sistema.');
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });

            if (error) {
                alert('Erro na autenticação: ' + error.message);
            } else {
                alert('Login efetuado com sucesso!');
                exibirEditor();
            }
        }

        // --- 4. GERAÇÃO DE URL E PUBLICAÇÃO (SUPABASE) ---
        function gerarSlugSEO(texto) {
            return texto.toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
                .replace(/[^a-z0-9 -]/g, "") // Remove caracteres especiais
                .replace(/\s+/g, "-") // Troca espaços por hífens
                .replace(/-+/g, "-");
        }

        async function publicarArtigoSupabase() {
            const titulo = document.getElementById('postTitulo').value;
            const categoria = document.getElementById('postCategoria').value;
            const descricao = document.getElementById('postDescricao').value;
            const conteudoHTML = quillEditor.root.innerHTML;

            if (!titulo || !descricao || quillEditor.isEmpty()) {
                alert('Por favor, preencha todos os campos do artigo!');
                return;
            }

            const slug = gerarSlugSEO(titulo);

            const { data, error } = await supabase
                .from('artigos')
                .insert([
                    {
                        titulo: titulo,
                        categoria: categoria,
                        descricao: descricao,
                        conteudo: conteudoHTML,
                        slug: slug,
                        autor: 'jpsoaresoficial@gmail.com'
                    }
                ]);

            if (error) {
                alert('Erro ao publicar artigo no Supabase: ' + error.message);
            } else {
                alert('🎉 Artigo publicado com sucesso!');
                fecharPainelAdmin();
                // Redireciona para a URL com o novo artigo
                window.location.href = `?slug=${slug}`;
            }
        }

        // --- 5. RENDERIZAÇÃO DE INTERFACE E METADADOS SEO ---
        function renderizarHtml(titulo, categoria, corpoTexto) {
            mainContainer.innerHTML = `
                <article>
                    <header class="article-header">
                        <span class="meta-category">${categoria}</span>
                        <h1 class="article-title">${titulo}</h1>
                        <div class="article-meta-info">
                            <div class="author-avatar">QP</div>
                            <div>
                                Publicado por <strong>Equipe QualProcessador</strong> • Atualizado em Julho de 2026
                            </div>
                        </div>
                    </header>

                    <div class="article-container">
                        <div class="article-body">
                            ${corpoTexto}
                        </div>
                    </div>
                </article>
            `;
        }

        function configurarSEO(titulo, descricao) {
            document.title = `${titulo} - QualProcessador`;
            
            definirMetaTag('name', 'description', descricao);
            definirMetaTag('property', 'og:title', `${titulo} - QualProcessador`);
            definirMetaTag('property', 'og:description', descricao);
            definirMetaTag('property', 'og:url', window.location.href);

            let canonicalLink = document.querySelector('link[rel="canonical"]');
            if (!canonicalLink) {
                canonicalLink = document.createElement('link');
                canonicalLink.setAttribute('rel', 'canonical');
                document.head.appendChild(canonicalLink);
            }
            canonicalLink.setAttribute('href', window.location.href);

            injetarDadosEstruturados(titulo, descricao);
        }

        function definirMetaTag(atributo, valor, conteudo) {
            let elemento = document.querySelector(`meta[${atributo}="${valor}"]`);
            if (!elemento) {
                elemento = document.createElement('meta');
                elemento.setAttribute(atributo, valor);
                document.head.appendChild(elemento);
            }
            elemento.setAttribute('content', conteudo);
        }

        function injetarDadosEstruturados(titulo, descricao) {
            const idAntigo = document.getElementById('seo-schema-dinamico');
            if (idAntigo) idAntigo.remove();

            const jsonLd = {
                "@context": "https://schema.org",
                "@type": "TechArticle",
                "headline": titulo,
                "description": descricao,
                "author": {
                    "@type": "Organization",
                    "name": "Equipe QualProcessador",
                    "url": window.location.origin
                }
            };

            const script = document.createElement('script');
            script.id = 'seo-schema-dinamico';
            script.type = 'application/ld+json';
            script.text = JSON.stringify(jsonLd);
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
