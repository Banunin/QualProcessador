<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/icon.ico" type="image/x-icon">
    <title>Artigos de Hardware - QualProcessador</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7fa; color: #0f172a; margin: 0; padding: 0; }

        .hero-magazine { background: #0f172a; color: white; padding: 50px 40px; text-align: center; }
        .hero-magazine h1 { margin: 0; font-size: 2.5rem; font-weight: 800; }
        .hero-magazine p { margin: 10px 0 25px 0; color: #94a3b8; font-size: 1.05rem; }

        /* Barra de Busca de Artigos */
        .search-magazine { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; }
        .search-magazine input { flex: 1; padding: 14px 20px; border-radius: 8px; border: none; font-family: 'Poppins', sans-serif; font-size: 1rem; outline: none; }
        .search-magazine button { padding: 0 25px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: 800; cursor: pointer; transition: opacity 0.2s; }
        .search-magazine button:hover { opacity: 0.9; }

        .portal-nav { background-color: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 5; }
        .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 40px; display: flex; gap: 5px; }
        .nav-link { padding: 20px 25px; color: #475569; text-decoration: none; font-weight: 700; font-size: 0.95rem; border-bottom: 3px solid transparent; }
        .nav-link:hover, .nav-link.active { color: #38bdf8; border-bottom-color: #38bdf8; background-color: #f8fafc; }

        .container { width: 100%; max-width: 1200px; margin: 40px auto; padding: 0 20px; min-height: 50vh; }

        /* LISTA DE ARTIGOS/ANÁLISES */
        .articles-list { display: flex; flex-direction: column; gap: 30px; }
        
        .article-card-horizontal {
            display: flex;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(15, 23, 42, 0.03);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            height: 220px;
        }
        .article-card-horizontal:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(15, 23, 42, 0.08); border-color: #cbd5e1; }
        
        .article-image { width: 350px; background-size: cover; background-position: center; background-color: #e2e8f0; }
        
        .article-content { padding: 30px; display: flex; flex-direction: column; justify-content: center; flex: 1; }
        .article-tag { font-size: 0.8rem; font-weight: 800; color: #ef4444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .article-content h2 { margin: 0 0 10px 0; font-size: 1.6rem; font-weight: 800; color: #0f172a; line-height: 1.2; }
        .article-content p { margin: 0; color: #64748b; font-size: 0.95rem; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .article-meta { margin-top: 15px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; display: flex; gap: 15px; }

        footer { text-align: center; padding: 40px; color: #64748b; border-top: 1px solid #e2e8f0; font-size: 0.85rem; margin-top: 60px; }

        @media (max-width: 768px) {
            .article-card-horizontal { flex-direction: column; height: auto; }
            .article-image { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

    <header class="hero-magazine">
        <h1>Artigos</h1>
        <p>Testes de desempenho práticos, benchmarks e vereditos editoriais.</p>
        
        <div class="search-magazine">
            <input type="text" id="campoBusca" placeholder="Buscar por Artigos (Ex: Ryzen 7, APU, Teste de temperatura)..." onkeyup="filtrarArtigos()">
            <button onclick="filtrarArtigos()">Procurar</button>
        </div>
    </header>

    <nav class="portal-nav">
        <div class="nav-container">
            <a href="index.html" class="nav-link">Home</a>
            <a href="analises.html" class="nav-link active">Artigos</a>
            <a href="forum.html" class="nav-link">Fórum</a>
            <a href="Comunidade.html" class="nav-link">Comunidade</a>
            <a href="ferramentas.html" class="nav-link">Ferramentas</a>
        </div>
    </nav>

    <div class="container">
        <div class="articles-list" id="listaArtigos">
            <p style="text-align: center; color: #64748b;">Carregando artigos...</p>
        </div>
    </div>

    <footer>&copy; 2026 QualProcessador</footer>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        // Lembre-se de colocar as suas credenciais reais aqui
        const SUPABASE_URL = "https://sterozqxsblanvjyzjmi.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0ZXJvenF4c2JsYW52anl6am1pIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mzc5Nzc5MCwiZXhwIjoyMDk5MzczNzkwfQ.LnU1u7jpLt69Ia8UEsrF5_RBlQbS2f5GL386OansCEs";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Artigos Padrão/Locais (Caso a conexão falhe ou para servir de base)
        const artigosLocais = [
            {
                url: "ler-artigo.html?id=0",
                imagem: "https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?q=80&w=600&auto=format&fit=crop",
                categoria: "Review AMD",
                corTag: "#ef4444",
                titulo: "AMD Ryzen 5 4500: Ainda vale a pena montar um PC barato com ele?",
                descricao: "Testamos o processador de entrada da AMD. Ele ainda tem fôlego ou o baixo cache L3 afunda a experiência em pleno 2026?",
                data: "Julho de 2026",
                leitura: "5 min"
            },
            {
                url: "ler-artigo.html?id=100",
                imagem: "https://images.unsplash.com/photo-1591488320449-011701bb6704?q=80&w=600&auto=format&fit=crop",
                categoria: "Guia de Hardware",
                corTag: "#10b981",
                titulo: "O que é uma APU? Entenda como funciona um processador com vídeo integrado",
                descricao: "Descubra como funcionam os processadores que reúnem CPU e GPU no mesmo chip. Entenda as vantagens, desvantagens e se vale a pena comprar uma APU para rodar jogos sem placa de vídeo dedicada.",
                data: "Julho de 2026",
                leitura: "5 min"
            }
        ];

        let todosOsArtigos = [];

        document.addEventListener('DOMContentLoaded', carregarTodosOsArtigos);

        async function carregarTodosOsArtigos() {
            let artigosFormatadosSupabase = [];

            try {
                // Busca artigos salvos no banco do Supabase
                const { data, error } = await supabase
                    .from('artigos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (!error && data) {
                    artigosFormatadosSupabase = data.map(item => ({
                        url: `ler-artigo.html?slug=${item.slug}`,
                        imagem: "https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?q=80&w=600&auto=format&fit=crop",
                        categoria: item.categoria || "Análise Editorial",
                        corTag: "#38bdf8",
                        titulo: item.titulo,
                        descricao: item.descricao,
                        data: new Date(item.created_at).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' }),
                        leitura: "4 min"
                    }));
                }
            } catch (e) {
                console.log("Serviço do Supabase offline ou ainda não configurado, exibindo apenas locais.");
            }

            // Junta os artigos criados via Admin com os nativos
            todosOsArtigos = [...artigosFormatadosSupabase, ...artigosLocais];
            renderizarLista(todosOsArtigos);
        }

        function renderizarLista(lista) {
            const container = document.getElementById('listaArtigos');

            if (lista.length === 0) {
                container.innerHTML = `<p style="text-align: center; color: #64748b; margin: 40px 0;">Nenhum artigo encontrado com esse termo.</p>`;
                return;
            }

            container.innerHTML = lista.map(artigo => `
                <a href="${artigo.url}" class="article-card-horizontal">
                    <div class="article-image" style="background-image: url('${artigo.imagem}');"></div>
                    <div class="article-content">
                        <span class="article-tag" style="color: ${artigo.corTag};">${artigo.categoria}</span>
                        <h2>${artigo.titulo}</h2>
                        <p>${artigo.descricao}</p>
                        <div class="article-meta">
                            <span>🗓️ ${artigo.data}</span>
                            <span>⏱️ Leitura: ${artigo.leitura}</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // Função do filtro de busca dinâmica
        function filtrarArtigos() {
            const termo = document.getElementById('campoBusca').value.toLowerCase();
            const artigosFiltrados = todosOsArtigos.filter(artigo => 
                artigo.titulo.toLowerCase().includes(termo) || 
                artigo.descricao.toLowerCase().includes(termo)
            );
            renderizarLista(artigosFiltrados);
        }
    </script>
</body>
</html>
