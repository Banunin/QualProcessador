        // Função auxiliar para gerar SLUGS amigáveis para a URL melhorar o SEO
        function slugify(text) {
            if (!text) return "";
            return text.toString().toLowerCase().trim()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove acentos
                .replace(/[^a-z0-9 -]/g, '') // Remove caracteres especiais

        /* --- SISTEMA DE REAÇÕES (LIMITADO A 1 POR PESSOA) --- */

        function processarReacaoObjeto(reacoes, username, tipo) {
            let r = reacoes;
            // Se o dado for nulo, inválido ou legado (numérico), reinicia estruturado
            if (!r || typeof r !== 'object' || Array.isArray(r)) {
                r = { like: [], smile: [], neutral: [], dislike: [], angry: [] };
            }
            const keys = ['like', 'smile', 'neutral', 'dislike', 'angry'];
            keys.forEach(k => {
                if (!Array.isArray(r[k])) r[k] = [];
            });

            // Localiza se o usuário já tem uma reação ativa neste post
            let reacaoAtual = null;
            keys.forEach(k => {
                if (r[k].includes(username)) reacaoAtual = k;
            });

            if (reacaoAtual === tipo) {
                // Remove voto caso clique no mesmo emoji
                r[tipo] = r[tipo].filter(u => u !== username);
            } else {
                // Remove o voto antigo e insere no novo emoji escolhido
                if (reacaoAtual) {
                    r[reacaoAtual] = r[reacaoAtual].filter(u => u !== username);
                }
                r[tipo].push(username);
            }
            return r;
        }

            const keys = ['like', 'smile', 'neutral', 'dislike', 'angry'];
            
            let badgesHTML = '';
            
            keys.forEach(k => {
                let list = Array.isArray(r[k]) ? r[k] : [];
                let totalVotos = list.length;
                
                // Trata reações legadas antigas de tipo número
                if (typeof r[k] === 'number') totalVotos = r[k];
                
                if (totalVotos > 0) {

                    const acaoReagir = isTopico ? `reagirTopico(event, '${k}')` : `reagirResposta(event, ${idResposta}, '${k}')`;
                    badgesHTML += `
                        <button type="button" class="reacao-badge ${votou ? 'votado' : ''}" onclick="${acaoReagir}">
                            ${emojiMap[k]} <span>${totalVotos}</span>
                        </button>
                    `;
                }
            });

            const popoverId = `popover-${idAlvo}`;
            let popoverEmojisHTML = '';
            keys.forEach(k => {
                const acaoReagir = isTopico ? `reagirTopico(event, '${k}')` : `reagirResposta(event, ${idResposta}, '${k}')`;
                popoverEmojisHTML += `
                    <button type="button" class="popover-emoji" onclick="${acaoReagir}" title="${k}">${emojiMap[k]}</button>
                `;
            });

            return `
                <div class="reacoes-container">
                    ${badgesHTML}
                    <button type="button" class="btn-reagir-trigger" onclick="togglePopover(event, '${popoverId}')">
                        😊 Reagir
                    </button>
                    <div class="reacoes-popover" id="${popoverId}" onclick="event.stopPropagation()">
                        ${popoverEmojisHTML}
                    </div>
                </div>
            `;
        }

        async function reagirTopico(event, tipo) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const logado = obterUsuarioLogado();
            if(!logado) return alert("Faça login para reagir!");
            let { data: t } = await dbClient.from('topicos').select('reacoes').eq('id', idTopico).single();
            let reacoes = processarReacaoObjeto(t.reacoes, logado.username, tipo);
            await dbClient.from('topicos').update({ reacoes: reacoes }).eq('id', idTopico);
            window.location.reload();
        }

        async function reagirResposta(event, idResposta, tipo) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            const logado = obterUsuarioLogado();
            if(!logado) return alert("Faça login para reagir!");
            let { data: t } = await dbClient.from('topicos').select('respostas').eq('id', idTopico).single();
            let lista = t.respostas;
            let respIndex = lista.findIndex(r => r.id === idResposta);
            if(respIndex > -1) {
                lista[respIndex].reacoes = processarReacaoObjeto(lista[respIndex].reacoes, logado.username, tipo);
                await dbClient.from('topicos').update({ respostas: lista }).eq('id', idTopico);
                window.location.reload();
            }
        }

        /* --- SESSÃO DE EDIÇÃO INLINE --- */

        function abrirEdicao(idDOM, isTopico, idResposta = null) {
            const container = document.getElementById(idDOM);
            const currentText = container.innerText;
            const actionSave = isTopico ? `salvarEdicaoTopico()` : `salvarEdicaoResposta(${idResposta})`;
            
            container.innerHTML = `
                <textarea id="input-${idDOM}" rows="5" style="width:100%; padding:15px; border:1px solid #cbd5e1; border-radius:8px; font-family:inherit; font-size:0.95rem; line-height:1.6; outline:none; resize:vertical; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">${currentText}</textarea>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button onclick="${actionSave}" class="btn-main" style="padding:8px 16px;">Salvar Alterações</button>
                    <button onclick="window.location.reload()" class="action-link">Cancelar</button>
                </div>
            `;
        }

        async function salvarEdicaoTopico() {
            const novoTexto = document.getElementById('input-text-topico').value.trim();
            if(!novoTexto) return;
            await dbClient.from('topicos').update({ conteudo: novoTexto, editado: true }).eq('id', idTopico);
            window.location.reload();
        }

        async function salvarEdicaoResposta(idResposta) {
            const novoTexto = document.getElementById(`input-text-resp-${idResposta}`).value.trim();
            if(!novoTexto) return;
            let { data: t } = await dbClient.from('topicos').select('respostas').eq('id', idTopico).single();
            let lista = t.respostas;
            let respIndex = lista.findIndex(r => r.id === idResposta);
            if(respIndex > -1) {
                lista[respIndex].conteudo = novoTexto;
                lista[respIndex].editado = true;
                await dbClient.from('topicos').update({ respostas: lista }).eq('id', idTopico);
                window.location.reload();
            }
        }

        async function excluirTopicoCompleto(id) {
            if(confirm("Deletar permanentemente este tópico?")){
                await dbClient.from('topicos').delete().eq('id', id);
                window.location.href = "forum.html";
            }
        }

        async function excluirRespostaIndividual(idTopico, idResposta) {
            if(confirm("Remover comentário?")){
                let { data: t } = await dbClient.from('topicos').select('respostas').eq('id', idTopico).single();
                if(t && Array.isArray(t.respostas)) {
                    let novasResp = t.respostas.filter(r => r.id !== idResposta);
                    await dbClient.from('topicos').update({ respostas: novasResp }).eq('id', idTopico);
                    window.location.reload();
                }
            }
        }

        async function salvarAlteracoesPerfil() {
            const logado = obterUsuarioLogado();

            const novaBio = document.getElementById('edit-bio').value.trim();
            const novoAvatar = document.getElementById('edit-avatar').value.trim();

            let { error } = await dbClient.from('usuarios').update({

                                    ${gerarComponenteReacoesHTML(t.reacoes, 'text-topico', true)}
                                    <div class="post-actions">
                                        ${permissaoTopico ? `<button class="action-link" onclick="abrirEdicao('text-topico', true)">Editar</button>` : ''}
                                        ${permissaoTopico ? `<button class="action-link delete" onclick="excluirTopicoCompleto(${t.id})">Excluir Tópico</button>` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                        ${respostasHTML}
                        ${formRespostaHTML}
                    `;
                }
            } else {
                await renderizarListaTopicos();
            }
        }

        inicializarForum();
    </script>
</body>
</html>
